<div class="auth-wrapper">
  <div class="auth-content">
    <div class="auth-bg">
      <span class="r"></span>
      <span class="r s"></span>
      <span class="r s"></span>
      <span class="r"></span>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="mb-4">
          <div class="auth-icon">👥</div>
        </div>
        <h3>Sign Up</h3>
        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
          <div class="input-group">
            <span class="input-group-text">👤</span>
            <input
              type="text"
              class="form-control"
              placeholder="Full Name"
              name="name"
              [(ngModel)]="registerObj.name"
              required
              #name="ngModel"
            />
          </div>
          <div class="input-group">
            <span class="input-group-text">@</span>
            <input
              type="text"
              class="form-control"
              placeholder="Username"
              name="username"
              [(ngModel)]="registerObj.username"
              required
              #username="ngModel"
            />
          </div>
          <div class="input-group">
            <span class="input-group-text">🔒</span>
            <input
              type="password"
              class="form-control"
              placeholder="Password"
              name="password"
              [(ngModel)]="registerObj.password"
              required
              #password="ngModel"
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary btn-block"
            [disabled]="isLoading || !registerForm.valid"
          >
            <span
              *ngIf="isLoading"
              class="spinner-border-sm me-2"
            ></span>
            {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
          </button>
        </form>
        <p class="text-muted">
          Already have an account?
          <a routerLink="/login" class="f-w-400">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
